<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aolin 的个人网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 80px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            font-size: 1.2em;
            line-height: 1.8;
            margin-bottom: 15px;
        }
        .emoji {
            font-size: 3em;
            margin-bottom: 20px;
        }
        .highlight {
            color: #667eea;
            font-weight: bold;
        }
        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">👋🌟</div>
        <h1>欢迎来到 Aolin 的个人网站！</h1>
        <p>你好！这是我的 <span class="highlight">GitHub Pages</span> 网站。</p>
        <p>网站正在建设中，敬请期待更多精彩内容！🚀</p>
        <p>这里将会分享我的项目、想法和学习笔记。</p>
        <div class="footer">
            <p>© 2026 Aolin | 由 GitHub Pages 提供支持</p>
        </div>
    </div>
</body>
</html>
